<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrimURL — URL Shortener</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* NAVBAR */
    nav {
      background: #fff;
      border-bottom: 1px solid #ececec;
      padding: 14px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #111;
    }

    .logo span {
      color: #7c3aed;
    }

    .nav-tag {
      font-size: 12px;
      color: #7c3aed;
      background: #f3eeff;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* MAIN LAYOUT */
    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* LEFT PANEL */
    .left-panel {
      width: 420px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #ececec;
      display: flex;
      flex-direction: column;
      padding: 36px 32px;
      gap: 24px;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #111;
      line-height: 1.3;
    }

    .panel-title span {
      color: #7c3aed;
    }

    .panel-subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
      font-weight: 400;
    }

    .divider {
      height: 1px;
      background: #ececec;
    }

    /* FORM */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.35;
    }

    input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: all 0.15s;
    }

    input:focus {
      border-color: #7c3aed;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.08);
    }

    input::placeholder {
      color: #bbb;
    }

    button.primary {
      padding: 12px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.2px;
    }

    button.primary:hover {
      background: #6d28d9;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(124,58,237,0.25);
    }

    button.primary:active {
      transform: translateY(0);
    }

    /* RESULT */
    #result {
      display: none;
      padding: 14px;
      background: #f6f1ff;
      border: 1.5px solid #ddd0fa;
      border-radius: 10px;
      flex-direction: column;
      gap: 10px;
    }

    .result-label {
      font-size: 11px;
      font-weight: 600;
      color: #7c3aed;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #shortLink {
      color: #7c3aed;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #shortLink:hover {
      text-decoration: underline;
    }

    .copy-btn {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .copy-btn:hover {
      background: #6d28d9;
    }

    .error-box {
      display: none;
      padding: 12px 14px;
      background: #fff5f5;
      border: 1.5px solid #fecaca;
      border-radius: 10px;
      color: #dc2626;
      font-size: 13px;
    }

    /* STATS ROW */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .stat-box {
      flex: 1;
      background: #fafafa;
      border: 1px solid #ececec;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: #7c3aed;
    }

    .stat-label {
      font-size: 11px;
      color: #aaa;
      font-weight: 500;
      margin-top: 2px;
    }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px 32px;
      overflow: hidden;
    }

    .right-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .right-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #111;
    }

    .badge {
      background: #f3eeff;
      color: #7c3aed;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* TABLE */
    .table-wrapper {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #ececec;
      border-radius: 14px;
      background: #fff;
    }

    .table-wrapper::-webkit-scrollbar {
      width: 4px;
    }

    .table-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }

    .table-wrapper::-webkit-scrollbar-thumb {
      background: #e0d7f7;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      position: sticky;
      top: 0;
      background: #fafafa;
      border-bottom: 1px solid #ececec;
      z-index: 1;
    }

    th {
      padding: 11px 16px;
      text-align: left;
      color: #aaa;
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    td {
      padding: 13px 16px;
      border-bottom: 1px solid #f5f5f5;
      color: #444;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #fdf9ff;
    }

    .code-pill {
      background: #f3eeff;
      color: #7c3aed;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }

    .code-pill:hover {
      background: #ebe3ff;
    }

    .click-pill {
      background: #f0fdf4;
      color: #16a34a;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #bbf7d0;
      display: inline-block;
    }

    .url-text {
      color: #888;
      font-size: 12.5px;
    }

    button.delete-btn {
      background: transparent;
      border: 1.5px solid #e5e5e5;
      color: #999;
      padding: 5px 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: all 0.15s;
    }

    button.delete-btn:hover {
      border-color: #fca5a5;
      color: #ef4444;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #ccc;
      padding: 60px 0;
      font-size: 13px;
    }

    .empty-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">Trim<span>URL</span></div>
    <span class="nav-tag">Free URL Shortener</span>
  </nav>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div>
        <div class="panel-title">Shorten your<br/><span>long URLs</span> instantly</div>
        <div class="panel-subtitle">Paste a URL below and get a clean short link in seconds.</div>
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label>Destination URL</label>
        <div class="input-wrapper">
          <span class="icon">🔗</span>
          <input type="text" id="urlInput" placeholder="https://your-long-url.com/..." />
        </div>
      </div>

      <div class="form-group">
        <label>Custom Code <span style="color:#bbb;font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <div class="input-wrapper">
          <span class="icon">✏️</span>
          <input type="text" id="customCode" placeholder="e.g. my-link" />
        </div>
      </div>

      <button class="primary" onclick="shorten()">⚡ Generate Short Link</button>

      <div id="result">
        <div class="result-label">✅ Your short link is ready</div>
        <div class="result-row">
          <a id="shortLink" href="#" target="_blank"></a>
          <button class="copy-btn" onclick="copyLink()">Copy</button>
        </div>
      </div>

      <div id="error" class="error-box"></div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="totalLinks">0</div>
          <div class="stat-label">Total Links</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="totalClicks">0</div>
          <div class="stat-label">Total Clicks</div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="right-header">
        <h2>All Shortened URLs</h2>
        <span class="badge" id="countBadge">0 links</span>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Short Code</th>
              <th>Original URL</th>
              <th>Clicks</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="urlList"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    let currentShortUrl = '';

    async function shorten() {
      const url = document.getElementById('urlInput').value.trim();
      const customCode = document.getElementById('customCode').value.trim();
      const resultDiv = document.getElementById('result');
      const errorDiv = document.getElementById('error');

      resultDiv.style.display = 'none';
      errorDiv.style.display = 'none';

      if (!url) {
        errorDiv.textContent = '⚠️ Please enter a URL.';
        errorDiv.style.display = 'block';
        return;
      }

      const res = await fetch('/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, customCode })
      });

      const data = await res.json();

      if (data.error) {
        errorDiv.textContent = '⚠️ ' + data.error;
        errorDiv.style.display = 'block';
        return;
      }

      currentShortUrl = data.shortUrl;
      const linkEl = document.getElementById('shortLink');
      linkEl.href = data.shortUrl;
      linkEl.textContent = data.shortUrl;
      resultDiv.style.display = 'flex';

      document.getElementById('urlInput').value = '';
      document.getElementById('customCode').value = '';
      loadAll();
    }

    function copyLink() {
      navigator.clipboard.writeText(currentShortUrl);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    }

    async function deleteURL(code) {
      await fetch(`/delete/${code}`, { method: 'DELETE' });
      loadAll();
    }

    async function loadAll() {
      const res = await fetch('/all');
      const data = await res.json();
      const tbody = document.getElementById('urlList');
      const badge = document.getElementById('countBadge');

      const totalClicks = data.reduce((sum, e) => sum + (e.clicks || 0), 0);
      document.getElementById('totalLinks').textContent = data.length;
      document.getElementById('totalClicks').textContent = totalClicks;
      badge.textContent = `${data.length} link${data.length !== 1 ? 's' : ''}`;

      if (data.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="4" class="empty">
              <span class="empty-icon"></span>
              No links yet — paste a URL on the left!
            </td>
          </tr>`;
        return;
      }

      tbody.innerHTML = data.map(e => `
        <tr>
          <td><a class="code-pill" href="/${e.code}" target="_blank">${e.code}</a></td>
          <td class="url-text" title="${e.url}">${e.url}</td>
          <td><span class="click-pill">${e.clicks || 0} clicks</span></td>
          <td><button class="delete-btn" onclick="deleteURL('${e.code}')">Delete</button></td>
        </tr>
      `).join('');
    }

    loadAll();
  </script>

</body>
</html>
