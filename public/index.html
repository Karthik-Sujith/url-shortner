<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrimURL — URL Shortener</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f4f8;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    nav {
      background: #fff;
      border-bottom: 1px solid #ececec;
      padding: 14px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #111;
    }

    .logo span {
      color: #7c3aed;
    }

    .nav-tag {
      font-size: 12px;
      color: #7c3aed;
      background: #f3eeff;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* PAGE WRAPPER */
    .page {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 32px 24px;
    }

    /* INNER WRAPPER */
    .inner {
      width: 100%;
      max-width: 1100px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    /* LEFT PANEL */
    .left-panel {
      width: 380px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      padding: 28px 24px;
      gap: 20px;
      position: sticky;
      top: 80px;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #111;
      line-height: 1.3;
    }

    .panel-title span {
      color: #7c3aed;
    }

    .panel-subtitle {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.3;
    }

    input {
      width: 100%;
      padding: 11px 14px 11px 36px;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: all 0.15s;
    }

    input:focus {
      border-color: #7c3aed;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.08);
    }

    input::placeholder {
      color: #bbb;
    }

    button.primary {
      padding: 12px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    button.primary:hover {
      background: #6d28d9;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(124,58,237,0.25);
    }

    /* RESULT */
    #result {
      display: none;
      padding: 14px;
      background: #f6f1ff;
      border: 1.5px solid #ddd0fa;
      border-radius: 10px;
      flex-direction: column;
      gap: 10px;
    }

    .result-label {
      font-size: 11px;
      font-weight: 600;
      color: #7c3aed;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #shortLink {
      color: #7c3aed;
      font-weight: 600;
      font-size: 13px;
      text-decoration: none;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #shortLink:hover {
      text-decoration: underline;
    }

    .copy-btn {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: #6d28d9;
    }

    .error-box {
      display: none;
      padding: 12px 14px;
      background: #fff5f5;
      border: 1.5px solid #fecaca;
      border-radius: 10px;
      color: #dc2626;
      font-size: 13px;
    }

    /* STATS */
    .stats-row {
      display: flex;
      gap: 10px;
    }

    .stat-box {
      flex: 1;
      background: #f8f5ff;
      border: 1px solid #ede5ff;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .stat-num {
      font-size: 24px;
      font-weight: 700;
      color: #7c3aed;
    }

    .stat-label {
      font-size: 11px;
      color: #aaa;
      font-weight: 500;
      margin-top: 3px;
    }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .right-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .right-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #111;
    }

    .badge {
      background: #f3eeff;
      color: #7c3aed;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* TABLE */
    .table-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
      overflow: hidden;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    .table-wrapper::-webkit-scrollbar {
      height: 4px;
    }

    .table-wrapper::-webkit-scrollbar-thumb {
      background: #e0d7f7;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 400px;
    }

    thead {
      background: #fafafa;
      border-bottom: 1px solid #ececec;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      color: #aaa;
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }

    td {
      padding: 13px 16px;
      border-bottom: 1px solid #f5f5f5;
      color: #444;
      vertical-align: middle;
    }

    td.url-cell {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #fdf9ff;
    }

    .code-pill {
      background: #f3eeff;
      color: #7c3aed;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    .code-pill:hover {
      background: #ebe3ff;
    }

    .click-pill {
      background: #f0fdf4;
      color: #16a34a;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #bbf7d0;
      display: inline-block;
      white-space: nowrap;
    }

    .url-text {
      color: #888;
      font-size: 12.5px;
    }

    button.delete-btn {
      background: transparent;
      border: 1.5px solid #e5e5e5;
      color: #999;
      padding: 5px 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: all 0.15s;
      white-space: nowrap;
    }

    button.delete-btn:hover {
      border-color: #fca5a5;
      color: #ef4444;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #ccc;
      padding: 50px 0;
      font-size: 13px;
    }

    .empty-icon {
      font-size: 32px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    /* ================================
       MEDIA QUERIES
    ================================ */

    /* Large screens — center with max-width */
    @media (min-width: 1600px) {
      nav {
        padding: 14px 0;
      }

      nav > * {
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        padding: 0 48px;
      }

      /* Simpler: just limit nav content */
      nav {
        padding: 14px 48px;
      }

      .page {
        padding: 40px 48px;
      }

      .inner {
        max-width: 1400px;
      }
    }

    /* Tablet landscape */
    @media (max-width: 1024px) {
      .inner {
        max-width: 100%;
        gap: 20px;
      }

      .left-panel {
        width: 320px;
        top: 72px;
      }

      .panel-title {
        font-size: 19px;
      }
    }

    /* Tablet portrait */
    @media (max-width: 768px) {
      nav {
        padding: 12px 20px;
      }

      .page {
        padding: 20px 16px;
      }

      .inner {
        flex-direction: column;
        gap: 20px;
      }

      .left-panel {
        width: 100%;
        position: static;
        padding: 24px 20px;
      }

      .right-panel {
        width: 100%;
      }

      .panel-title {
        font-size: 20px;
      }

      .stat-num {
        font-size: 20px;
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      nav {
        padding: 12px 16px;
      }

      .logo {
        font-size: 16px;
      }

      .nav-tag {
        font-size: 11px;
        padding: 3px 10px;
      }

      .page {
        padding: 16px 12px;
      }

      .inner {
        flex-direction: column;
        gap: 16px;
      }

      .left-panel {
        width: 100%;
        position: static;
        padding: 20px 16px;
        gap: 16px;
        border-radius: 14px;
      }

      .panel-title {
        font-size: 18px;
      }

      .panel-subtitle {
        font-size: 12px;
      }

      input {
        font-size: 13px;
        padding: 10px 12px 10px 34px;
      }

      button.primary {
        font-size: 13px;
        padding: 11px;
      }

      .stats-row {
        gap: 8px;
      }

      .stat-box {
        padding: 12px 8px;
      }

      .stat-num {
        font-size: 20px;
      }

      .stat-label {
        font-size: 10px;
      }

      .right-panel {
        width: 100%;
      }

      .table-card {
        border-radius: 14px;
      }

      th {
        font-size: 10px;
        padding: 10px 12px;
      }

      td {
        padding: 11px 12px;
        font-size: 12px;
      }

      .right-header h2 {
        font-size: 15px;
      }

      .badge {
        font-size: 11px;
        padding: 3px 10px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">Trim<span>URL</span></div>
    <span class="nav-tag">Free URL Shortener</span>
  </nav>

  <!-- PAGE -->
  <div class="page">
    <div class="inner">

      <!-- LEFT PANEL -->
      <div class="left-panel">
        <div>
          <div class="panel-title">Shorten your<br/><span>long URLs</span> instantly</div>
          <div class="panel-subtitle">Paste a URL below and get a clean short link in seconds.</div>
        </div>

        <div class="divider"></div>

        <div class="form-group">
          <label>Destination URL</label>
          <div class="input-wrapper">
            <span class="icon">🔗</span>
            <input type="text" id="urlInput" placeholder="https://your-long-url.com/..." />
          </div>
        </div>

        <div class="form-group">
          <label>Custom Code <span style="color:#bbb;font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
          <div class="input-wrapper">
            <span class="icon">✏️</span>
            <input type="text" id="customCode" placeholder="e.g. my-link" />
          </div>
        </div>

        <button class="primary" onclick="shorten()">⚡ Generate Short Link</button>

        <div id="result">
          <div class="result-label">✅ Your short link is ready</div>
          <div class="result-row">
            <a id="shortLink" href="#" target="_blank"></a>
            <button class="copy-btn" onclick="copyLink()">Copy</button>
          </div>
        </div>

        <div id="error" class="error-box"></div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num" id="totalLinks">0</div>
            <div class="stat-label">Total Links</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="totalClicks">0</div>
            <div class="stat-label">Total Clicks</div>
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <div class="right-header">
          <h2>All Shortened URLs</h2>
          <span class="badge" id="countBadge">0 links</span>
        </div>

        <div class="table-card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Short Code</th>
                  <th>Original URL</th>
                  <th>Clicks</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="urlList"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    let currentShortUrl = '';

    async function shorten() {
      const url = document.getElementById('urlInput').value.trim();
      const customCode = document.getElementById('customCode').value.trim();
      const resultDiv = document.getElementById('result');
      const errorDiv = document.getElementById('error');

      resultDiv.style.display = 'none';
      errorDiv.style.display = 'none';

      if (!url) {
        errorDiv.textContent = '⚠️ Please enter a URL.';
        errorDiv.style.display = 'block';
        return;
      }

      const res = await fetch('/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, customCode })
      });

      const data = await res.json();

      if (data.error) {
        errorDiv.textContent = '⚠️ ' + data.error;
        errorDiv.style.display = 'block';
        return;
      }

      currentShortUrl = data.shortUrl;
      const linkEl = document.getElementById('shortLink');
      linkEl.href = data.shortUrl;
      linkEl.textContent = data.shortUrl;
      resultDiv.style.display = 'flex';

      document.getElementById('urlInput').value = '';
      document.getElementById('customCode').value = '';
      loadAll();
    }

    function copyLink() {
      navigator.clipboard.writeText(currentShortUrl);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    }

    async function deleteURL(code) {
      await fetch(`/delete/${code}`, { method: 'DELETE' });
      loadAll();
    }

    async function loadAll() {
      const res = await fetch('/all');
      const data = await res.json();
      const tbody = document.getElementById('urlList');
      const badge = document.getElementById('countBadge');

      const totalClicks = data.reduce((sum, e) => sum + (e.clicks || 0), 0);
      document.getElementById('totalLinks').textContent = data.length;
      document.getElementById('totalClicks').textContent = totalClicks;
      badge.textContent = `${data.length} link${data.length !== 1 ? 's' : ''}`;

      if (data.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="4" class="empty">
              <span class="empty-icon">🔗</span>
              No links yet — paste a URL on the left!
            </td>
          </tr>`;
        return;
      }

      tbody.innerHTML = data.map(e => `
        <tr>
          <td><a class="code-pill" href="/${e.code}" target="_blank">${e.code}</a></td>
          <td class="url-cell url-text" title="${e.url}">${e.url}</td>
          <td><span class="click-pill">${e.clicks || 0} clicks</span></td>
          <td><button class="delete-btn" onclick="deleteURL('${e.code}')">Delete</button></td>
        </tr>
      `).join('');
    }

    loadAll();
  </script>

</body>
</html>
